name: Validate Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-bicep@v2
      - name: Validate Bicep templates
        shell: pwsh
        run: ./tests/validate-guardrails.ps1